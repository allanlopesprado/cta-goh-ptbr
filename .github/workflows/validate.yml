name: Validate

on:
  pull_request:
  push:
    branches: [main]

jobs:
  build-pak:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Build pak
        shell: pwsh
        run: |
          $dist = "./dist"
          if (-Not (Test-Path $dist)) { New-Item -ItemType Directory -Path $dist | Out-Null }
          Compress-Archive -Path "localization/default" -DestinationPath "$dist/default.pak" -Force
          if (-not (Test-Path "$dist/default.pak")) {
            Write-Error "dist/default.pak was not generated"
          }

      - name: Validate pak structure
        shell: pwsh
        run: |
          Add-Type -AssemblyName System.IO.Compression.FileSystem
          $pak = ".\dist\default.pak"
          $zip = [System.IO.Compression.ZipFile]::OpenRead($pak)
          $entries = $zip.Entries

          $hasRoot = ($entries | Where-Object { $_.FullName -eq "default/" -or $_.FullName -like "default/*" }).Count -gt 0
          $hasInfo = ($entries | Where-Object { $_.FullName -eq "default/localization.info" }).Count -gt 0
          $potCount = ($entries | Where-Object { $_.FullName -like "default/interface/**/*.pot" }).Count

          if (-not $hasRoot) {
            $zip.Dispose()
            Write-Error "Missing root entry default/"
          }
          if (-not $hasInfo) {
            $zip.Dispose()
            Write-Error "Missing default/localization.info"
          }
          if ($potCount -lt 300) {
            $zip.Dispose()
            Write-Error "Unexpected .pot count inside pak: $potCount"
          }

          $zip.Dispose()
          Write-Host "PAK validation passed. POT files: $potCount"
