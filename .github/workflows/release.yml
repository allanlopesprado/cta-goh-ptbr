name: Release Pak

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (example: v1.1, v1.2, v2.0)"
        required: false
      title:
        description: "Release title"
        required: false
      notes:
        description: "Release notes (plain text)"
        required: false

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Determine release info
        id: release_info
        uses: actions/github-script@v9
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const tagsData = await github.rest.repos.listTags({ owner, repo, per_page: 100 });
            const tags = tagsData.data
              .map(tag => tag.name)
              .filter(name => /^v\d+\.\d+(?:\.\d+)?$/.test(name));
            const parsed = tags
              .map(name => {
                const match = name.match(/^v(\d+)\.(\d+)(?:\.(\d+))?$/);
                return {
                  name,
                  major: Number(match[1]),
                  minor: Number(match[2]),
                  patch: Number(match[3] || 0),
                };
              })
              .sort((a, b) => {
                if (a.major !== b.major) return a.major - b.major;
                if (a.minor !== b.minor) return a.minor - b.minor;
                return a.patch - b.patch;
              });
            const latest = parsed.length ? parsed[parsed.length - 1].name : 'v1.0.0';
            const latestParts = latest.match(/^v(\d+)\.(\d+)(?:\.(\d+))?$/);
            const major = Number(latestParts[1]);
            const minor = Number(latestParts[2]);
            const patch = Number(latestParts[3] || 0);
            const nextTag = parsed.length ? `v${major}.${minor}.${patch + 1}` : 'v1.0.0';

            let releaseBody = 'Atualização automática sem mudanças de texto significativas.';
            if (context.eventName === 'push' && context.ref === 'refs/heads/main') {
              try {
                const compare = await github.rest.repos.compareCommits({ owner, repo, base: latest, head: context.sha });
                const commits = compare.data.commits || [];
                if (commits.length) {
                  const messages = commits.map(commit => `- ${commit.commit.message.split('\n')[0]}`);
                  releaseBody = `Alterações desde ${latest}:\n${messages.join('\n')}`;
                }
              } catch (error) {
                // fallback message is already set
              }
            }

            core.setOutput('latest_tag', latest);
            core.setOutput('next_tag', nextTag);
            core.setOutput('release_body', releaseBody);

      - name: Delete previous releases
        if: startsWith(github.ref, 'refs/tags/') || github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
        uses: actions/github-script@v9
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const releases = await github.rest.repos.listReleases({ owner, repo, per_page: 100 });
            for (const release of releases.data) {
              if (release.draft || release.prerelease) {
                continue;
              }
              await github.rest.repos.deleteRelease({ owner, repo, release_id: release.id });
            }

      - name: Build pak
        shell: bash
        run: |
          mkdir -p dist/packroot/default
          cp -r localization/pt_BR/* dist/packroot/default
          pushd dist/packroot >/dev/null
          zip -r ../default.pak default
          popd >/dev/null
          rm -rf dist/packroot
          if [ ! -f dist/default.pak ]; then
            echo "dist/default.pak was not generated"
            exit 1
          fi

      - name: Validate pak structure
        shell: bash
        run: |
          python3 - <<'PY'
          import zipfile
          pak = 'dist/default.pak'
          with zipfile.ZipFile(pak) as z:
              entries = [e.filename.replace('\\', '/') for e in z.infolist()]
              has_root = any(e == 'default/' or e.startswith('default/') for e in entries)
              has_info = 'default/localization.info' in entries
              pot_count = sum(1 for e in entries if e.startswith('default/interface/') and e.endswith('.pot'))
              if not has_root:
                  raise SystemExit('Missing root entry default/')
              if not has_info:
                  raise SystemExit('Missing default/localization.info')
              if pot_count < 300:
                  raise SystemExit(f'Unexpected .pot count inside pak: {pot_count}')
              print('PAK validation passed. POT files:', pot_count)
          PY

      - name: Create release (tag push)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3
        with:
          files: dist/default.pak
          generate_release_notes: true

      - name: Create or update release (main push)
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.release_info.outputs.next_tag }}
          name: ${{ steps.release_info.outputs.next_tag }}
          body: ${{ steps.release_info.outputs.release_body }}
          files: dist/default.pak

      - name: Create or update release (manual dispatch)
        if: github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.event.inputs.tag || 'v1.0' }}
          name: ${{ github.event.inputs.title || 'v1.0' }}
          body: ${{ github.event.inputs.notes || 'Manual release dispatch' }}
          files: dist/default.pak
