name: Release Pak

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (example: v1.1, v1.2, v2.0)"
        required: false
      title:
        description: "Release title"
        required: false
      notes:
        description: "Release notes (plain text)"
        required: false

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Determine release info
        id: release_info
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const tagsData = await github.rest.repos.listTags({ owner, repo, per_page: 100 });
            const tags = tagsData.data
              .map(tag => tag.name)
              .filter(name => /^v\d+\.\d+(?:\.\d+)?$/.test(name));
            const parsed = tags
              .map(name => {
                const match = name.match(/^v(\d+)\.(\d+)(?:\.(\d+))?$/);
                return {
                  name,
                  major: Number(match[1]),
                  minor: Number(match[2]),
                  patch: Number(match[3] || 0),
                };
              })
              .sort((a, b) => {
                if (a.major !== b.major) return a.major - b.major;
                if (a.minor !== b.minor) return a.minor - b.minor;
                return a.patch - b.patch;
              });
            const latest = parsed.length ? parsed[parsed.length - 1].name : 'v1.0.0';
            const latestParts = latest.match(/^v(\d+)\.(\d+)(?:\.(\d+))?$/);
            const major = Number(latestParts[1]);
            const minor = Number(latestParts[2]);
            const patch = Number(latestParts[3] || 0);
            const nextTag = parsed.length ? `v${major}.${minor}.${patch + 1}` : 'v1.0.0';

            let releaseBody = 'Atualização automática sem mudanças de texto significativas.';
            if (context.eventName === 'push' && context.ref === 'refs/heads/main') {
              try {
                const compare = await github.rest.repos.compareCommits({ owner, repo, base: latest, head: context.sha });
                const commits = compare.data.commits || [];
                if (commits.length) {
                  const messages = commits.map(commit => `- ${commit.commit.message.split('\n')[0]}`);
                  releaseBody = `Alterações desde ${latest}:\n${messages.join('\n')}`;
                }
              } catch (error) {
                // fallback message is already set
              }
            }

            core.setOutput('latest_tag', latest);
            core.setOutput('next_tag', nextTag);
            core.setOutput('release_body', releaseBody);

      - name: Build pak
        shell: pwsh
        run: |
          ./scripts/build-pak.ps1 -SourceFolder "localization/pt_BR" -DestinationFile "dist/default.pak" -PackageRootName "default"
          if (-not (Test-Path "dist/default.pak")) {
            Write-Error "dist/default.pak was not generated"
          }

      - name: Validate pak structure
        shell: pwsh
        run: |
          Add-Type -AssemblyName System.IO.Compression.FileSystem
          $pak = ".\dist\default.pak"
          $zip = [System.IO.Compression.ZipFile]::OpenRead($pak)
          $entries = $zip.Entries | ForEach-Object { $_.FullName -replace '\\','/' }

          $hasRoot = ($entries | Where-Object { $_ -eq "default/" -or $_ -like "default/*" }).Count -gt 0
          $hasInfo = ($entries | Where-Object { $_ -eq "default/localization.info" }).Count -gt 0
          $potCount = ($entries | Where-Object { $_ -like "default/interface/**/*.pot" }).Count

          if (-not $hasRoot) {
            $zip.Dispose()
            Write-Error "Missing root entry default/"
          }
          if (-not $hasInfo) {
            $zip.Dispose()
            Write-Error "Missing default/localization.info"
          }
          if ($potCount -lt 300) {
            $zip.Dispose()
            Write-Error "Unexpected .pot count inside pak: $potCount"
          }

          $zip.Dispose()
          Write-Host "PAK validation passed. POT files: $potCount"

      - name: Create release (tag push)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/default.pak
          generate_release_notes: true

      - name: Create or update release (main push)
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_info.outputs.next_tag }}
          name: ${{ steps.release_info.outputs.next_tag }}
          body: ${{ steps.release_info.outputs.release_body }}
          files: dist/default.pak

      - name: Create or update release (manual dispatch)
        if: github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || 'v1.0' }}
          name: ${{ github.event.inputs.title || 'v1.0' }}
          body: ${{ github.event.inputs.notes || 'Manual release dispatch' }}
          files: dist/default.pak
